<svg class="logo-svg" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
  style="overflow: visible;">
  <!-- Glitch Red (hidden by default; revealed on hover glitch) -->
  <g class="logo-glitch-layer logo-glitch-red" style="opacity: 0; display: none; color: #8A1C1C;">
    <g fill="currentColor">
      <rect x="18" y="28" width="6" height="44" />
      <rect x="18" y="28" width="22" height="6" />
      <rect x="18" y="47" width="17" height="6" />
      <rect x="18" y="66" width="22" height="6" />
      <rect x="47" y="66" width="6" height="6" />
      <rect x="60" y="28" width="22" height="6" />
      <rect x="68" y="28" width="6" height="44" />
      <rect x="60" y="66" width="22" height="6" />
    </g>
  </g>

  <!-- Glitch Blue -->
  <g class="logo-glitch-layer logo-glitch-blue" style="opacity: 0; display: none; color: #0047AB;">
    <g fill="currentColor">
      <rect x="18" y="28" width="6" height="44" />
      <rect x="18" y="28" width="22" height="6" />
      <rect x="18" y="47" width="17" height="6" />
      <rect x="18" y="66" width="22" height="6" />
      <rect x="47" y="66" width="6" height="6" />
      <rect x="60" y="28" width="22" height="6" />
      <rect x="68" y="28" width="6" height="44" />
      <rect x="60" y="66" width="22" height="6" />
    </g>
  </g>

  <!-- Main Composition: E . I  monogram
       Endurance Intelligence — bold geometric slabs, no curves. -->
  <g class="logo-main-layer" style="color: var(--color-text);">
    <g fill="currentColor">
      <!-- E: stem + three arms (middle shorter for readability) -->
      <rect x="18" y="28" width="6" height="44" />
      <rect x="18" y="28" width="22" height="6" />
      <rect x="18" y="47" width="17" height="6" />
      <rect x="18" y="66" width="22" height="6" />

      <!-- period between E and I (kept as the focal element for hover-glitch;
           the logo-outer-ring class preserves the existing JS hook) -->
      <rect class="logo-outer-ring" x="47" y="66" width="6" height="6" />

      <!-- I: top serif + stem + bottom serif -->
      <rect x="60" y="28" width="22" height="6" />
      <rect x="68" y="28" width="6" height="44" />
      <rect x="60" y="66" width="22" height="6" />
    </g>
  </g>
</svg>
