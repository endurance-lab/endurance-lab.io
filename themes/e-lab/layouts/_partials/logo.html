<svg class="logo-svg" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
  style="overflow: visible;">
  <!-- Frame (Classical/Digital Container) -->
  <!--rect class="logo-frame" x="5" y="5" width="90" height="90" stroke="var(--color-text)" stroke-width="1" fill="none" />

  <!-- Glitch Layers (Hidden by default, shown on glitch) -->
  <g class="logo-glitch-layer logo-glitch-red" style="opacity: 0; display: none;">
    <circle cx="50" cy="50" r="35" stroke="#8A1C1C" stroke-width="1" />
    <path d="M50 20 C 65 20, 80 35, 80 50 C 80 65, 65 80, 50 80 C 35 80, 20 65, 20 50 C 20 35, 35 20, 50 20 Z"
      stroke="#8A1C1C" stroke-width="0.5" stroke-dasharray="4 4" />
    <ellipse cx="50" cy="50" rx="22" ry="32" stroke="#8A1C1C" stroke-width="0.5" transform="rotate(45 50 50)" />
  </g>
  <g class="logo-glitch-layer logo-glitch-blue" style="opacity: 0; display: none;">
    <circle cx="50" cy="50" r="35" stroke="#0047AB" stroke-width="1" />
    <path d="M50 20 C 65 20, 80 35, 80 50 C 80 65, 65 80, 50 80 C 35 80, 20 65, 20 50 C 20 35, 35 20, 50 20 Z"
      stroke="#0047AB" stroke-width="0.5" stroke-dasharray="4 4" />
    <ellipse cx="50" cy="50" rx="22" ry="32" stroke="#0047AB" stroke-width="0.5" transform="rotate(45 50 50)" />
  </g>

  <!-- Main Composition -->
  <g class="logo-main-layer">
    <!-- Outer Ring (Minimal) -->
    <circle class="logo-outer-ring" cx="50" cy="50" r="35" stroke="var(--color-text)" stroke-width="0.0" />

    <!-- Dashed Path (Schematic) -->
    <path class="logo-dashed-path"
      d="M50 20 C 65 20, 80 35, 80 50 C 80 65, 65 80, 50 80 C 35 80, 20 65, 20 50 C 20 35, 35 20, 50 20 Z"
      stroke="var(--color-text)" stroke-width="0.5" stroke-dasharray="3 3" />

    <!-- Inner Orbits (Agentic Motion) -->
    <ellipse class="logo-inner-orbit-1" cx="50" cy="50" rx="22" ry="32" stroke="var(--color-text)" stroke-width="0.5"
      transform="rotate(45 50 50)" />
    <ellipse class="logo-inner-orbit-2" cx="50" cy="50" rx="22" ry="32" stroke="var(--color-text)" stroke-width="0.5"
      transform="rotate(-45 50 50)" />

    <!-- Particles (Life) -->
    <circle class="logo-particle-1" cx="50" cy="50" r="1.5" fill="var(--color-text)" />
    <circle class="logo-particle-2" cx="50" cy="50" r="1" fill="var(--color-text)" />
  </g>
</svg>
